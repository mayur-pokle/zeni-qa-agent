[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm --workspace backend run build"]

[start]
cmd = "if [ -z \"$DATABASE_URL\" ]; then echo '[startup] DATABASE_URL is not set - aborting'; exit 1; fi && npm --workspace backend run db:push && npm --workspace backend run start"
