[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "if [ -z \"$DATABASE_URL\" ]; then echo '[startup] DATABASE_URL is not set - aborting'; exit 1; fi && npx prisma db push --skip-generate && npm run start"
